<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESPECTREZ RP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

  <nav>
    <h1>RESPECTREZ RP</h1>

    <div class="links">
      <a href="#apply">التقديم</a>
      <a href="#rules">القوانين</a>
      <a href="#discord">ديسكورد</a>
    </div>
  </nav>

  <div class="hero">
    <h2>مرحباً بك في RESPECTREZ RP</h2>
    <p>أفضل تجربة رول بلاي عربية داخل FiveM</p>

    <div class="buttons">
      <a class="btn play">Play Now</a>
      <a class="btn discord">Discord</a>

</header>

<!-- 🔥 APPLICATION -->
<section id="apply">

  <h2>تقديم الدخول للسيرفر</h2>

  <form>

    <input type="text" placeholder="الاسم الحقيقي">

    <input type="number" placeholder="العمر">

    <input type="text" placeholder="ديسكورد (username#0000)">

    <input type="number" placeholder="عدد ساعات FiveM">

    <textarea placeholder="خبرتك في RP"></textarea>

    <textarea placeholder="ما معنى PowerGaming؟"></textarea>

    <textarea placeholder="ما معنى MetaGaming؟"></textarea>

    <textarea placeholder="ما معنى FearRP؟"></textarea>

    <textarea placeholder="إذا تم خطفك ماذا تفعل؟"></textarea>

    <textarea placeholder="قصة شخصيتك RP"></textarea>

    <textarea placeholder="لماذا تريد دخول السيرفر؟"></textarea>

    <button type="submit">إرسال التقديم</button>

  </form>

</section>

<script src="app.js"></script>

</body>
</html>
